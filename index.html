<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/icon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ADORIX</title>
</head>

<body>
  <div id="root">
    <style>
      .app-preloader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background-color: #050B0C;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 99999;
        font-family: monospace;
        overflow: hidden;
      }

      .terminal-box {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 0.75rem;
      }

      .terminal-text {
        color: #12B2C1;
        font-size: 1rem;
        font-weight: bold;
        letter-spacing: 0.1em;
        text-shadow: 0 0 8px rgba(18, 178, 193, 0.8);
      }

      .terminal-bar {
        display: flex;
        gap: 0.25rem;
      }

      .terminal-segment {
        width: 0.5rem;
        height: 1.5rem;
        transition: all 0.05s;
        border: 1px solid rgba(18, 178, 193, 0.3);
        background: transparent;
      }

      .terminal-segment.filled {
        background: #12B2C1;
        box-shadow: 0 0 12px rgba(18, 178, 193, 0.9);
        border-color: transparent;
      }

      .terminal-cursor {
        position: absolute;
        bottom: 2rem;
        left: 2rem;
        width: 0.5rem;
        height: 1rem;
        background: #12B2C1;
        animation: blink 1s infinite;
      }

      @keyframes blink {

        0%,
        100% {
          opacity: 1;
        }

        50% {
          opacity: 0;
        }
      }

      @media (min-width: 640px) {
        .terminal-text {
          font-size: 1.125rem;
        }

        .terminal-segment {
          width: 0.625rem;
          height: 2rem;
        }

        .terminal-bar {
          gap: 0.375rem;
        }
      }
    </style>

    <div class="app-preloader" id="app-preloader">
      <div class="terminal-box">
        <div class="terminal-text" id="terminal-text">&gt; System ready! 0%</div>
        <div class="terminal-bar" id="terminal-bar">
          <!-- 20 segments injected by JS -->
        </div>
      </div>
      <div class="terminal-cursor"></div>
    </div>

    <script>
      (function () {
        var bar = document.getElementById('terminal-bar');
        var text = document.getElementById('terminal-text');
        var progress = 0;

        // Spawn 20 segments
        for (var i = 0; i < 20; i++) {
          var seg = document.createElement('div');
          seg.className = 'terminal-segment';
          bar.appendChild(seg);
        }

        var interval = setInterval(function () {
          progress += Math.random() * 5 + 1;
          if (progress > 100) progress = 100;

          var displayProgress = Math.floor(progress);
          text.innerText = "> System ready! " + displayProgress + "%";

          var filledSegments = Math.round((displayProgress / 100) * 20);
          var children = bar.children;
          for (var j = 0; j < 20; j++) {
            if (j < filledSegments) children[j].classList.add('filled');
            else children[j].classList.remove('filled');
          }
        }, 120);
      })();
    </script>
  </div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>

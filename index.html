<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/icon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ADORIX</title>
</head>

<body>
  <div id="root">
    <style>
      .app-preloader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background-color: #E5F9F8;
        /* adorix-light */
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 99999;
        font-family: 'Inter', sans-serif;
        overflow: hidden;
      }

      /* Clean Harmonic Ripples */
      .ripple-container {
        position: relative;
        width: 100px;
        height: 100px;
        display: flex;
        justify-content: center;
        align-items: center;
        margin-bottom: 2rem;
      }

      .ripple-core {
        position: relative;
        z-index: 10;
        width: 16px;
        height: 16px;
        background: #0A7383;
        /* adorix-primary */
        border-radius: 50%;
        animation: core-pulse 2s ease-in-out infinite alternate;
        box-shadow: 0 0 10px rgba(10, 115, 131, 0.4);
      }

      .ripple-ring {
        position: absolute;
        border-radius: 50%;
        border: 2px solid rgba(18, 178, 193, 0.8);
        /* adorix-accent */
        opacity: 0;
        animation: ripple-expand 3s cubic-bezier(0.1, 0.8, 0.3, 1) infinite;
      }

      .ripple-ring:nth-child(2) {
        animation-delay: 1s;
      }

      .ripple-ring:nth-child(3) {
        animation-delay: 2s;
      }

      @keyframes ripple-expand {
        0% {
          width: 16px;
          height: 16px;
          opacity: 1;
          border-width: 3px;
        }

        100% {
          width: 120px;
          height: 120px;
          opacity: 0;
          border-width: 0px;
        }
      }

      @keyframes core-pulse {
        0% {
          transform: scale(1);
          box-shadow: 0 0 10px rgba(10, 115, 131, 0.4);
        }

        100% {
          transform: scale(1.3);
          box-shadow: 0 0 20px rgba(18, 178, 193, 0.8);
        }
      }

      /* Elegant SaaS Text */
      .premium-loading-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.75rem;
      }

      .premium-title {
        color: #1F2B2D;
        font-weight: 500;
        font-size: 1.1rem;
        letter-spacing: 0.3em;
        text-transform: uppercase;
        margin-right: -0.3em;
        animation: text-glow 2s ease-in-out infinite alternate;
      }

      @keyframes text-glow {
        0% {
          opacity: 0.8;
        }

        100% {
          opacity: 1;
          text-shadow: 0 0 8px rgba(18, 178, 193, 0.3);
        }
      }

      .premium-bar-container {
        width: 160px;
        height: 2px;
        background: rgba(10, 115, 131, 0.1);
        border-radius: 4px;
        overflow: hidden;
        position: relative;
      }

      .premium-bar-fill {
        height: 100%;
        width: 40%;
        background: linear-gradient(90deg, #0A7383, #12B2C1);
        border-radius: 4px;
        animation: smooth-scan 2.5s ease-in-out infinite alternate;
      }

      @keyframes smooth-scan {
        0% {
          transform: translateX(0);
          width: 10%;
          opacity: 0.5;
        }

        100% {
          transform: translateX(120px);
          width: 40%;
          opacity: 1;
        }
      }

      .premium-subtitle {
        color: rgba(10, 115, 131, 0.7);
        font-size: 0.7rem;
        font-weight: 600;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        animation: fade-sub 2s ease-in-out infinite alternate;
      }

      @keyframes fade-sub {
        0% {
          opacity: 0.4;
        }

        100% {
          opacity: 1;
        }
      }
    </style>
    <div class="app-preloader" id="app-preloader">
      <div class="ripple-container">
        <div class="ripple-ring"></div>
        <div class="ripple-ring"></div>
        <div class="ripple-ring"></div>
        <div class="ripple-core"></div>
      </div>
      <div class="premium-loading-container">
        <div class="premium-title">Loading</div>
        <div class="premium-bar-container">
          <div class="premium-bar-fill"></div>
        </div>
        <div class="premium-subtitle">Preparing workspace</div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
